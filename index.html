const USUARIOS_OCULTOS=['neto','gleidi','vagner']

async function carregarPerfis(){
if(
userP &&
Number(userP.nivel_acesso)!==1 &&
!['manoel','vagner','gleidi','charles'].includes(
(userP.username||'').toLowerCase()
)
)return
let {data,error}=await client.from('perfis').select('*').order('nome_completo')
if(error){console.error(error);return}
window.perfis=data||[]
let html=`
<table class="w-full text-xs">
<thead>
<tr class="text-slate-400 border-b border-white/20">
<th class="text-left p-2">Nome</th>
<th class="text-left p-2">Username</th>
<th class="text-left p-2">Cargo</th>
<th class="text-left p-2">Setor</th>
<th class="text-left p-2">Nível</th>
<th class="text-right p-2">Ações</th>
</tr>
</thead>
<tbody>
${window.perfis.map(p=>{
let isOculto=USUARIOS_OCULTOS.includes((p.username||'').toLowerCase())
return `
<tr class="border-b border-white/10 hover:bg-white/5">
<td class="p-2">${p.nome_completo||'-'}</td>
<td class="p-2">${p.username||'-'}</td>
<td class="p-2">${p.cargo||'-'}</td>
<td class="p-2">${p.setor||'-'}</td>
<td class="p-2">N${p.nivel_acesso||'-'}</td>
<td class="p-2 text-right">
<button ${isOculto?'disabled style="opacity:0.3;pointer-events:none"':''} onclick="editarPerfil('${p.id}')" class="bg-blue-600 px-2 py-1 rounded mr-1">Editar</button>
<button ${isOculto?'disabled style="opacity:0.3;pointer-events:none"':''} onclick="excluirPerfil('${p.id}')" class="bg-red-600 px-2 py-1 rounded">Excluir</button>
</td>
</tr>
`
}).join('')}
</tbody>
</table>
`
document.getElementById('listaPerfis').innerHTML=html
}

let editPerfilId=null
async function salvarPerfil(){
if(userP && Number(userP.nivel_acesso)!=1)return

let nome=document.getElementById('p_nome').value.trim()
let user=document.getElementById('p_user').value.trim().toLowerCase()
let cargo=document.getElementById('p_cargo').value.trim()
let setor=document.getElementById('p_setor').value.trim()
let nivel=Number(document.getElementById('p_nivel').value||3)

if(!nome||!user){
alert("Preencha nome e username")
return
}

let payload={
nome_completo:nome,
username:user,
cargo:cargo,
setor:setor,
nivel_acesso:nivel
}

let res

if(editPerfilId){
res=await client.from('perfis').update(payload).eq('id',editPerfilId)
}else{
res=await client.from('perfis').insert(payload)
}

if(res.error){
console.error(res.error)
alert("Erro ao salvar")
return
}

/* 🔥 LIMPA ESTADO */
editPerfilId=null
document.getElementById('p_nome').value=''
document.getElementById('p_user').value=''
document.getElementById('p_cargo').value=''
document.getElementById('p_setor').value=''
document.getElementById('p_nivel').value='3'

await carregarPerfis()
await atualizarResponsaveis?.()

alert("Salvo com sucesso")
}

function editarPerfil(id){
let p=window.perfis.find(x=>String(x.id)===String(id))
if(!p)return
editPerfilId=p.id
document.getElementById('p_nome').value=p.nome_completo||''
document.getElementById('p_user').value=p.username||''
document.getElementById('p_cargo').value=p.cargo||''
document.getElementById('p_setor').value=p.setor||''
document.getElementById('p_nivel').value=p.nivel_acesso||3
window.scrollTo({top:0,behavior:'smooth'})
}

async function excluirPerfil(id){
if(userP && Number(userP.nivel_acesso)!=1)return
let p=window.perfis.find(x=>x.id==id)
if(!p)return
if(!confirm(`Excluir ${p.nome_completo}?`))return
let {error}=await client.from('perfis').delete().eq('id',id)
if(error){console.error(error);alert("Erro ao excluir");return}
await carregarPerfis()
await atualizarResponsaveis()
}

  function limparFormPerfil(){
document.getElementById('p_nome').value=''
document.getElementById('p_user').value=''

document.getElementById('p_setor').value=''
document.getElementById('p_nivel').value='3'
}

  async function atualizarResponsaveis(){
let {data}=await client.from('perfis').select('*')
window.perfis=data||[]
}
  

function parseSubitemParts(s){
let [i,rest]=String(s||'0.0').split('.')
let n1=parseInt(i)||0
let n2=parseInt((rest||'0').replace(/[^\d].*$/,''))||0
let suf=(rest||'').replace(/^\d+/,'')||''
return {n1,n2,suf}
}
function compareSubitem(a,b){
let pa=parseSubitemParts(a.subitem)
let pb=parseSubitemParts(b.subitem)
if(pa.n1!==pb.n1)return pa.n1-pb.n1
if(pa.n2!==pb.n2)return pa.n2-pb.n2
return pa.suf.localeCompare(pb.suf)
}
function getItemKey(i){
return (i.item&&i.item!==''?i.item:(String(i.subitem||'0.0').split('.')[0]))
}
function getTotal(i){
return Math.max(
Number(i.jan||0),Number(i.fev||0),Number(i.mar||0),Number(i.abr||0),Number(i.mai||0),
Number(i.jun||0),Number(i.jul||0),Number(i.ago||0),Number(i.set||0),Number(i.out||0),Number(i.nov||0),Number(i.dez||0)
)
}
  
function formatarDataBR(dataStr){
if(!dataStr)return'-'
let p=dataStr.split('-')
if(p.length!==3)return dataStr
return p[2]+'/'+p[1]+'/'+p[0]
}

let ocultarConcluidos=false
function parseDataLocal(dataStr){
if(!dataStr) return null
let p=dataStr.split('-')

d.forEach(l=>{
csv+=c.map(k=>`"${(l[k]??'').toString().replace(/"/g,'""')}"`).join(";")+"\n"
})

let a=document.createElement("a")
a.href=URL.createObjectURL(b)
a.download=n+"_"+Date.now()+".csv"
a.click()
}

let {data,error}=await client
.from('perfistce')
.select('*')
.order('nome_completo')

if(error){
console.error(error)
return
}

window.perfisTCERO=data||[]

let podeEditar=
['manoel','vagner','gleidi'].includes(
(userP.username||'').toLowerCase()
)

document.getElementById('boxCadastroTCERO').style.display=
podeEditar?'flex':'none'

let html=''

window.perfisTCERO.forEach(p=>{

html+=`
<div class="grid grid-cols-6 gap-2 border-b border-slate-300 py-2 items-center">

<div class="text-black font-semibold">
${p.nome_completo||'-'}
</div>

<div class="text-blue-900 font-black">
${p.username||'-'}
</div>

<div class="text-black">
${p.cargo||'-'}
</div>

<div class="text-black font-black">
N${p.nivel_acesso||'-'}
</div>

<div class="text-black font-black">
${p.permissao_pdf?'SIM':'NÃO'}
</div>

<div>
${
podeEditar
?`
<button onclick="editarTCERO('${p.id}')" class="bg-blue-900 text-white px-2 py-1 rounded text-xs font-black">
EDITAR
</button>
`
:''
}
</div>

</div>
`

})

document.getElementById('listaTCERO').innerHTML=html

}

async function salvarPerfilTCERO(){

if(!['manoel','vagner'].includes((userP.username||'').toLowerCase())){
alert('Sem permissão')
return
}

let nome=t_nome.value.trim()
let user=t_user.value.trim().toLowerCase()
let senha=t_senha.value.trim()
let cargo=t_cargo.value.trim()

if(!nome||!user||!senha){
alert('Preencha os campos')
return
}

let payload={
nome_completo:nome,
username:user,
senha:senha,
cargo:cargo,
orgao:'TCERO',
nivel_acesso:'4',
somente_visualizacao:true,
permissao_pdf:false
}

await client
.from('perfis')
.insert(payload)

carregarTCERO()

t_nome.value=''
t_user.value=''
t_senha.value=''
t_cargo.value=''

}

async function excluirTCERO(id){

if(!['manoel','vagner'].includes((userP.username||'').toLowerCase())){
alert('Sem permissão')
return
}

if(!confirm('Excluir perfil?'))return

await client
.from('perfis')
.delete()
.eq('id',id)

carregarTCERO()

}
  
</script>
  
  
</body>
</html>
