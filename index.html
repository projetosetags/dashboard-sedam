<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" href="data:,">
<title>Auditoria TAG 2026 - SEDAM</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; }
.card-micro { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.05); padding: 0.5rem; transition: 0.2s; min-height: 90px; }
.card-micro:hover { background: rgba(30, 41, 59, 0.9); border-color: #3b82f6; }
.status-vencido { border-top: 3px solid #ef4444; }
.status-alerta { border-top: 3px solid #f59e0b; }
.status-em-dia { border-top: 3px solid #10b981; }
.text-xs-audit { font-size: 0.65rem; line-height: 1rem; }
.btn-correct { font-size: 0.55rem; padding: 2px 4px; background: rgba(59,130,246,0.2); border-radius: 4px; display: none; }
.card-micro:hover .btn-correct { display: block; }
</style>
</head>
<body class="p-2 md:p-4">
<div id="login-screen" class="min-h-screen flex items-center justify-center">
<div class="bg-slate-900 p-8 rounded-2xl w-full max-w-xs border border-white/5 shadow-2xl">
<h1 class="text-xl font-black text-center mb-6 text-blue-400">TAG AUDITORIA</h1>
<input type="text" id="userInput" placeholder="Usuário" class="w-full p-3 mb-3 bg-slate-800 rounded-lg text-sm border-none text-white">
<input type="password" id="passInput" placeholder="Senha" class="w-full p-3 mb-4 bg-slate-800 rounded-lg text-sm border-none text-white">
<button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold text-sm transition-all">ENTRAR</button>
<p id="login-msg" class="text-center mt-4 text-[10px] text-red-400"></p>
</div>
</div>
<div id="dashboard" class="hidden">
<header class="flex justify-between items-center mb-4 px-2">
<div>
<h2 class="text-lg font-black text-blue-400">PAINEL DE CONTROLE TAG 2026</h2>
<p id="user-info" class="text-[10px] text-slate-500 uppercase tracking-widest"></p>
</div>
<div class="flex items-center gap-6">
<div class="text-right"><span class="block text-[8px] text-slate-500 font-bold">CUMPRIMENTO GLOBAL</span><span id="total-geral" class="text-xl font-black text-emerald-400">0%</span></div>
<button onclick="logout()" class="text-[10px] bg-red-500/10 text-red-400 px-3 py-1 rounded-md font-bold">SAIR</button>
</div>
</header>
<div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-4">
<div class="lg:col-span-3 bg-slate-900/50 p-4 rounded-xl border border-white/5"><div class="h-[150px]"><canvas id="mainChart"></canvas></div></div>
<div id="form-area" class="hidden bg-slate-900/50 p-4 rounded-xl border border-white/5">
<h3 class="text-[10px] font-bold text-blue-400 mb-2 uppercase">Lançar Evolução (Maio)</h3>
<select id="delib_id" class="w-full p-2 mb-2 bg-slate-800 rounded text-[10px] text-white border-none"></select>
<input type="number" id="percentual" placeholder="%" class="w-full p-2 mb-2 bg-slate-800 rounded text-[10px] text-white border-none">
<button onclick="salvarLancamento()" class="w-full bg-emerald-600 py-2 rounded text-[10px] font-bold">SALVAR</button>
</div>
</div>
<div id="cards-container" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 xl:grid-cols-10 2xl:grid-cols-12 gap-1.5"></div>
</div>
<script>
const S_URL = 'https://zvtzbiqfwhggysiuiuxh.supabase.co';
const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2dHpiaXFmd2hnZ3lzaXVpdXhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1ODYyMjcsImV4cCI6MjA5MzE2MjIyN30.tCnFZv2B6Kmd9KsyZM8CHClZqsq7Nyu-8nxyYVs_ZMQ';
const client = supabase.createClient(S_URL, S_KEY, { global: { headers: { 'apikey': S_KEY } } });
let userProfile = null;

function ordenarIdentificadores(a, b) {
const partesA = a.identificador.split('.').map(p => isNaN(p) ? p : parseInt(p));
const partesB = b.identificador.split('.').map(p => isNaN(p) ? p : parseInt(p));
for (let i = 0; i < Math.max(partesA.length, partesB.length); i++) {
if (partesA[i] === undefined) return -1;
if (partesB[i] === undefined) return 1;
if (partesA[i] !== partesB[i]) return partesA[i] > partesB[i] ? 1 : -1;
}
return 0;
}
  
async function login() {
let e = document.getElementById('userInput').value.trim().toLowerCase();
const p = document.getElementById('passInput').value;
if(!e.includes('@')) e += '@sedam.com';
const { data, error } = await client.auth.signInWithPassword({ email: e, password: p });
if(error) document.getElementById('login-msg').innerText = error.message; else init(data.user.id);
}
async function init(uid) {
const { data: profile } = await client.from('perfis').select('*').eq('id', uid).single();
if(!profile) return;
userProfile = profile;
document.getElementById('login-screen').classList.add('hidden');
document.getElementById('dashboard').classList.remove('hidden');
document.getElementById('user-info').innerText = `${profile.nome_completo} | ${profile.nivel_acesso}`;
if(profile.hierarquia >= 3) document.getElementById('form-area').classList.remove('hidden');
carregarDados();
}
async function carregarDados() {
const { data: delibs, error } = await client.from('deliberacoes').select('*, perfis:responsavel_id(username)');
if(error) { console.error(error); return; }
if(delibs) {
// Aplica a ordenação técnica customizada antes de renderizar
const delibsOrdenadas = delibs.sort(ordenarIdentificadores);
const soma = delibsOrdenadas.reduce((acc, curr) => acc + (curr.total_cumprimento || 0), 0);
document.getElementById('total-geral').innerText = Math.round(soma / delibsOrdenadas.length) + "%";
renderCards(delibsOrdenadas);
renderSelect(delibsOrdenadas);
const { data: evol } = await client.from('evolucao_mensal').select('mes_referencia, percentual_lancado').order('mes_referencia');
renderChart(evol);
}
}

// FUNÇÃO RENDERIZAÇÃO DE MICRO-CARDS (AUDITORIA)
function renderCards(itens) {
const container = document.getElementById('cards-container');
const hoje = new Date();
container.innerHTML = itens.map(i => {
const prazo = new Date(i.prazo);
const diff = Math.ceil((prazo - hoje) / 86400000);
let cor = i.total_cumprimento < 100 ? (diff < 0 ? 'status-vencido' : 'status-alerta') : 'status-em-dia';
const editBtn = userProfile.hierarquia === 1 ? `<button onclick="corrigir('${i.id}', '${i.identificador}', ${i.total_cumprimento})" class="btn-correct">AJUSTAR</button>` : '';
return `
<div class="card-micro rounded-lg ${cor} flex flex-col justify-between shadow-sm">
<div class="flex justify-between items-start">
<span class="font-black text-blue-400 text-[10px] tracking-tighter">${i.identificador}</span>
${editBtn}
</div>
<p class="text-xs-audit text-slate-400 line-clamp-2 mb-1" title="${i.descricao}">${i.descricao}</p>
<div>
<div class="flex justify-between text-[7px] mb-0.5">
<span class="text-slate-600 uppercase">ABR/26</span>
<span class="font-bold text-blue-400">${i.total_cumprimento || 0}%</span>
</div>
<div class="w-full bg-slate-900 h-0.5 rounded-full overflow-hidden">
<div class="bg-blue-500 h-full transition-all duration-1000" style="width:${i.total_cumprimento || 0}%"></div>
</div>
</div>
</div>`;
}).join('');
}
  
async function corrigir(id, ident, valor) {
const novo = prompt(`[AUDITORIA] Ajustar cumprimento Meta ${ident}:`, valor);
if(novo !== null) {
const { error } = await client.from('deliberacoes').update({ total_cumprimento: novo }).eq('id', id);
if(!error) carregarDados();
}
}
function renderChart(dados) {
const ctx = document.getElementById('mainChart').getContext('2d');
if(window.myChart) window.myChart.destroy();
const agrupar = dados.reduce((acc, c) => { acc[c.mes_referencia] = (acc[c.mes_referencia] || 0) + parseFloat(c.percentual_lancado); return acc; }, {});
window.myChart = new Chart(ctx, { type: 'line', data: { labels: Object.keys(agrupar), datasets: [{ label: 'Evolução', data: Object.values(agrupar), borderColor: '#3b82f6', tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
}
function renderSelect(itens) {
const sel = document.getElementById('delib_id');
sel.innerHTML = itens.map(i => `<option value="${i.id}">${i.identificador}</option>`).join('');
}
async function logout() { await client.auth.signOut(); location.reload(); }
</script>
</body>
</html>
