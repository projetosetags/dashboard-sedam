<script>
function parseSubitemParts(s){
let [i,rest]=String(s||'0.0').split('.')
let n1=parseInt(i)||0
let n2=parseInt((rest||'0').replace(/[^\d].*$/,''))||0
let suf=(rest||'').replace(/^\d+/,'')||''
return {n1,n2,suf}
}
function compareSubitem(a,b){
let pa=parseSubitemParts(a.subitem)
let pb=parseSubitemParts(b.subitem)
if(pa.n1!==pb.n1)return pa.n1-pb.n1
if(pa.n2!==pb.n2)return pa.n2-pb.n2
return pa.suf.localeCompare(pb.suf)
}
function getItemKey(i){
return (i.item&&i.item!==''?i.item:(String(i.subitem||'0.0').split('.')[0]))
}
function getTotal(i){
return Math.max(
Number(i.jan||0),Number(i.fev||0),Number(i.mar||0),Number(i.abr||0),Number(i.mai||0),
Number(i.jun||0),Number(i.jul||0),Number(i.ago||0),Number(i.set||0),Number(i.out||0),Number(i.nov||0),Number(i.dez||0)
)
}
  
function formatarDataBR(dataStr){
if(!dataStr)return'-'
let p=dataStr.split('-')
if(p.length!==3)return dataStr
return p[2]+'/'+p[1]+'/'+p[0]
}

let ocultarConcluidos=false
function parseDataLocal(dataStr){
if(!dataStr) return null
let p=dataStr.split('-')
if(p.length!==3) return null
return new Date(Number(p[0]),Number(p[1])-1,Number(p[2]),12,0,0)
}

const descItens={"1":"Planejamento Estratégico e Governança","2":"Análise e Revisão do Planejamento Estratégico","3":"Atualização e Consolidação do Plano Estratégico","4":"Governança e Monitoramento Estratégico","5":"Mapeamento e Melhoria de Processos","6":"Desenvolvimento e Estruturação de Sistemas","7":"Adequação Normativa e Legal","8":"Capacitação Técnica e Sensoriamento","9":"Desenvolvimento de Sistemas e Integração","10":"Integração e Expansão Tecnológica","12":"Transparência e Portal Público","15":"Revisão de Plano de Ação","24":"Cadastro de Unidades de Conservação","25":"Programas Ambientais e REDD+","30":"Articulação Institucional","31":"Organização e Gestão Operacional","33":"Monitoramento e Coleta de Dados","45":"Ações Integradas e Cooperação"}

function renderResumo(){
let mapa={}
let base=[...allData]
if(filtroDataInicio||filtroDataFim){
base=base.filter(i=>{

return true
})

base=base.filter(i=>getTotal(i)<100)
}

let key=(modoResumo==='item')?getItemKey(i):i.subitem

return pa.n2-pb.n2
})
document.getElementById('cards-container').innerHTML=keys.map(k=>{
let lista=mapa[k]

}

}
  
function renderTable(){
let lista=[...allData].sort(compareSubitem)
lista=lista.filter(i=>{
if(filtroItemAtivo){
if(getItemKey(i)!==filtroItemAtivo)return false
}
let dataBase=parseDataLocal(i.data_inicio)||parseDataLocal(i.prazo_texto)

if(!dataBase)return false
if(filtroDataInicio&&dataBase<parseDataLocal(filtroDataInicio))return false

}

})
let totalRegistros=lista.length
document.getElementById('table-body').innerHTML=lista.map(i=>{

`<select onchange="salvarResponsavel('${i.id}',this.value)" class="bg-slate-800 text-xs p-1 rounded w-full">

</td>

function renderGraficoMaster(){
let el=document.getElementById('chartMaster');if(!el)return;let ctx=el.getContext('2d');if(!ctx)return;if(chartMaster)chartMaster.destroy();let tipo=document.getElementById('tipoGrafico').value;let selItem=document.getElementById('filtroItem').value;let selSub=document.getElementById('filtroSubitem').value;let meses=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];let mesAtual=getMesAtualIndex();let labels=meses.slice(0,mesAtual+1);let cores=['#22c55e','#3b82f6','#f59e0b','#ef4444','#a855f7','#06b6d4','#84cc16','#f97316','#eab308','#14b8a6','#6366f1','#ec4899'];let datasets=[];
if(tipo==='subitem'){
let i=allData.find(x=>String(x.id)===String(selSub));if(!i)return;let valores=[Number(i.jan??0),Number(i.fev??0),Number(i.mar??0),Number(i.abr??0),Number(i.mai??0),Number(i.jun??0),Number(i.jul??0),Number(i.ago??0),Number(i.set??0),Number(i.out??0),Number(i.nov??0),Number(i.dez??0)];
datasets=[{label:i.subitem,data:valores.slice(0,mesAtual+1),backgroundColor:cores.slice(0,mesAtual+1),borderRadius:6}]
}
if(tipo==='item'){
let mapa={};let base=selItem==='todos'?allData:allData.filter(i=>(i.subitem||'').startsWith(selItem+'.'));
base.forEach(i=>{let item=(i.subitem||'').split('.')[0];if(!mapa[item])mapa[item]=[];mapa[item].push(i)});
let medias=[];
for(let m=0;m<=mesAtual;m++){
let mesKey=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][m];
let soma=0;let count=0;
Object.values(mapa).forEach(lista=>{soma+=mediaMes(lista,mesKey);count++});
medias.push(Math.round(soma/(count||1)));
}
datasets=[{label:'MÉDIA ITEM',data:medias,backgroundColor:cores.slice(0,mesAtual+1),borderRadius:6}]
}
chartMaster=new Chart(ctx,{
type:'bar',
data:{labels,datasets},
options:{
responsive:true,
plugins:{
legend:{display:true,labels:{color:'#cbd5f5'}},
tooltip:{callbacks:{label:(ctx)=>ctx.raw+'%'}}
},
scales:{y:{beginAtZero:true,max:100,ticks:{callback:(v)=>v+'%'}}},
animation:{duration:800}
},
plugins:[{
id:'labels',
afterDatasetsDraw(chart){
let {ctx}=chart
chart.data.datasets.forEach((dataset,i)=>{
let meta=chart.getDatasetMeta(i)
meta.data.forEach((bar,index)=>{
let val=dataset.data[index]
ctx.fillStyle='#fff'
ctx.font='bold 10px Arial'
ctx.textAlign='center'
ctx.fillText(val+'%',bar.x,bar.y-5)
})
})
}
}]
})
}

function mediaMes(lista,mes){
return Math.round(lista.reduce((a,c)=>a+Number(c[mes]??0),0)/lista.length)
}
function getGraficoBase64(){
let canvas=document.getElementById('chartMaster')
if(!canvas)return null
return canvas.toDataURL('image/png',1.0)
}
