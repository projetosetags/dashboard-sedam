<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" href="data:,">
<title>Auditoria TAG Sedam 2026 - TCE/RO</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
<style>
body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; }
/* Estilo Semafórico dos Cards - Botão Completo */
.card-micro { padding: 0.15rem; min-height: 40px; display: flex; align-items: center; justify-content: center; transition: 0.2s; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
.bg-status-red { background-color: #991b1b !important; } /* 0-30% */
.bg-status-yellow { background-color: #854d0e !important; } /* 31-99% */
.bg-status-green { background-color: #065f46 !important; } /* 100% */
.percent-big { font-size: 1.1rem; font-weight: 900; color: white; }
.tab-btn { padding: 0.6rem 1rem; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #64748b; border-bottom: 2px solid transparent; transition: 0.3s; }
.tab-active { color: #3b82f6; border-bottom-color: #3b82f6; background: rgba(59,130,246,0.05); }
.input-table { background: transparent; border: none; color: #3b82f6; font-weight: 800; width: 45px; text-align: center; font-size: 11px; }
.row-100 { background: rgba(16, 185, 129, 0.12) !important; color: #10b981; font-weight: 700; }
.legend-box { background: rgba(30,41,59,0.6); border: 1px solid rgba(59,130,246,0.2); padding: 1rem; border-radius: 10px; margin-top: 1rem; font-size: 0.7rem; color: #cbd5e1; white-space: pre-wrap; }
.btn-pdf { background: #ef4444; color: white; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; transition: 0.3s; }
</style>
</head>
<body class="p-2 md:p-4">
<div id="login-screen" class="min-h-screen flex items-center justify-center">
<div class="bg-slate-900 p-8 rounded-3xl border border-white/5 shadow-2xl w-full max-w-xs text-center">
<h1 class="text-xl font-black text-blue-400 mb-6 uppercase">TAG Sedam</h1>
<input type="text" id="u" placeholder="Usuário" class="w-full p-3 mb-3 bg-slate-800 rounded-lg text-white text-sm">
<input type="password" id="p" placeholder="Senha" class="w-full p-3 mb-4 bg-slate-800 rounded-lg text-white text-sm">
<button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold text-sm">ACESSAR PAINEL</button>
</div>
</div>

<div id="dashboard" class="hidden">
<header class="flex justify-between items-center mb-4 px-2">
<div><h2 class="text-lg font-black text-blue-400 leading-none tracking-tighter uppercase">Painel de Auditoria TAG 2026</h2><p id="user-info" class="text-[9px] text-slate-500 mt-1 uppercase italic"></p></div>
<div class="flex items-center gap-4">
<div id="pdf-container"></div>
<div class="text-right border-l border-white/10 pl-4"><span class="block text-[7px] text-slate-500 font-bold uppercase">Média Geral TAG</span><span id="total-geral" class="text-2xl font-black text-emerald-400">0%</span></div>
<button onclick="logout()" class="text-[9px] bg-white/5 text-slate-400 px-2 py-1 rounded">SAIR</button>
</div>
</header>

<nav class="flex gap-1 mb-4 border-b border-white/5 overflow-x-auto">
<button onclick="switchTab('resumo')" id="tab-resumo" class="tab-btn tab-active">Resumo</button>
<button onclick="switchTab('mensal')" id="tab-mensal" class="tab-btn">Monitoramento</button>
<button onclick="switchTab('analise')" id="tab-analise" class="tab-btn">Gráficos</button>
<button onclick="switchTab('concluidos')" id="tab-concluidos" class="tab-btn">100% Cumpridos</button>
</nav>

<!-- ABA 1: RESUMO (CARDS SEMAFÓRICOS) -->
<div id="view-resumo" class="tab-view"><div id="cards-container" class="grid grid-cols-6 sm:grid-cols-12 md:grid-cols-16 lg:grid-cols-20 2xl:grid-cols-28 gap-1"></div></div>

<!-- ABA 2: MONITORAMENTO (TABELA COMPLETA) -->
<div id="view-mensal" class="tab-view hidden">
<div class="bg-slate-900/40 rounded-xl border border-white/5 overflow-x-auto">
<table class="w-full text-left border-collapse min-w-[1400px]">
<thead><tr class="text-[8px] text-slate-500 uppercase border-b border-white/10">
<th class="p-3">Sub-Item</th><th class="p-3 w-1/4">Descrição da Ação</th><th>Responsável</th><th>Coordenadoria</th><th>Início</th><th>Março</th><th>Abril</th><th class="text-blue-400">Maio</th><th class="p-3 text-right">Total</th>
</tr></thead>
<tbody id="table-body" class="text-[10px]"></tbody>
</table>
</div>
</div>

<!-- ABA 3: ANÁLISE GRÁFICA (MULTINÍVEL + CARRY-FORWARD) -->
<div id="view-analise" class="tab-view hidden">
<div class="bg-slate-900/40 p-6 rounded-2xl border border-white/5">
<div class="flex flex-col sm:flex-row gap-3 mb-6">
<div class="flex flex-col gap-1"><label class="text-[8px] text-slate-500 font-bold uppercase">1. Item do TAG</label><select id="sel-item" onchange="updateSubSelect()" class="bg-slate-800 text-[10px] rounded p-2 text-white border-none w-72"></select></div>
<div class="flex flex-col gap-1"><label class="text-[8px] text-slate-500 font-bold uppercase">2. Sub-Item / Ação</label><select id="sel-sub" onchange="renderChart()" class="bg-slate-800 text-[10px] rounded p-2 text-white border-none w-72"></select></div>
</div>
<div class="h-[300px]"><canvas id="barChart"></canvas></div>
<div id="chart-legend" class="legend-box hidden"></div>
</div>
</div>
<div id="ranking" class="mt-6 text-xs"></div>
<!-- ABA 4: 100% CUMPRIDOS (LISTA DESCRITIVA) -->
<div id="view-concluidos" class="tab-view hidden">
<div id="concluidos-container" class="grid grid-cols-6 sm:grid-cols-12 lg:grid-cols-18 gap-1 mb-8"></div>
<div class="bg-slate-900/40 p-6 rounded-xl border border-emerald-500/20">
<h3 class="text-emerald-400 font-bold text-xs mb-4 uppercase">Descrição das Ações Cumpridas (100%)</h3>
<div id="concluidos-list" class="space-y-2 text-[10px] text-slate-400"></div>
</div>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{
let uid=localStorage.getItem("uid")
if(uid) init(uid)
})

const S_URL='https://zvtzbiqfwhggysiuiuxh.supabase.co'
const S_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2dHpiaXFmd2hnZ3lzaXVpdXhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1ODYyMjcsImV4cCI6MjA5MzE2MjIyN30.tCnFZv2B6Kmd9KsyZM8CHClZqsq7Nyu-8nxyYVs_ZMQ'
const client=supabase.createClient(S_URL,S_KEY)

let userP=null
let allData=[]
let myChart=null

async function login(){
let u=document.getElementById('u').value.trim().toLowerCase()
let {data,error}=await client.from('perfis').select('*').eq('username',u).single()
if(error||!data){alert("Usuário não encontrado");return}
localStorage.setItem("uid",data.id)
init(data.id)
}

async function init(uid){
let {data,error}=await client.from('perfis').select('*').eq('id',uid).single()
if(error||!data){alert("Erro perfil");return}

userP=data

document.getElementById('login-screen').classList.add('hidden')
document.getElementById('dashboard').classList.remove('hidden')

document.getElementById('user-info').innerText=
data.nome_completo+" | "+data.cargo+" (Nível "+data.nivel_acesso+")"

if(data.nivel_acesso<=2){
document.getElementById('pdf-container').innerHTML=
`<button onclick="gerarRelatorioPDF()" class="btn-pdf">PDF A4</button>`
}

carregarDados()
}

async function carregarDados(){

let query=client.from('deliberacoes').select('*,evolucao_mensal(*)')

// 🔒 CONTROLE POR RESPONSÁVEL
if(userP.nivel_acesso!=1){
query=query.eq('responsavel_id',userP.id)
}

let {data}=await query

if(!data){allData=[];return}

allData=(data||[])
.filter(d=>d && d.identificador)
.sort((a,b)=>
String(a.identificador||'').localeCompare(String(b.identificador||''),undefined,{numeric:true})
)

let media=allData.length
?Math.round(allData.reduce((acc,c)=>acc+(c.total_cumprimento||0),0)/allData.length)
:0

document.getElementById('total-geral').innerText=media+"%"

renderResumo()
renderTable()
renderConcluidos()
renderSelects()
renderChart()
renderRanking()
}

function renderResumo(){
document.getElementById('cards-container').innerHTML=
allData.map(i=>{
let v=i.total_cumprimento||0
let cor =
i.status_cor==='red' ? 'bg-status-red' :
i.status_cor==='green' ? 'bg-status-green' :
'bg-status-yellow'
return `<div class="card-micro ${cor}"><span class="percent-big">${v}%</span></div>`
}).join('')
}

function renderTable(){
document.getElementById('table-body').innerHTML=
allData.map(i=>{

let abr=i.evolucao_mensal?.find(e=>e.mes_referencia==='2026-04-01')?.percentual_lancado||0
let mai=i.evolucao_mensal?.find(e=>e.mes_referencia==='2026-05-01')?.percentual_lancado||0

let canEdit=(userP.nivel_acesso==1||i.responsavel_id==userP.id)

// 🔥 PATCH 3 → DATA INTELIGENTE
let dataFormatada = i.data_inicio
? new Date(i.data_inicio).toLocaleDateString('pt-BR')
: (i.prazo_texto || '-')

// 🔥 PATCH 2 → COR POR STATUS
let bg =
i.status_cor==='red' ? 'bg-red-900/20' :
i.status_cor==='yellow' ? 'bg-yellow-900/20' :
i.status_cor==='green' ? 'bg-emerald-900/20' : ''

return `<tr class="border-b border-white/5 ${bg}">
<td class="p-3 font-black text-blue-400">${i.identificador}</td>
<td class="p-3">${i.descricao||'-'}</td>
<td>${i.responsavel||'-'}</td>
<td>${i.coordenadoria||'-'}</td>
<td>${dataFormatada}</td>
<td class="opacity-50">0%</td>
<td>${abr}%</td>
<td><input type="number" class="input-table" value="${mai}" ${!canEdit?'disabled':''} onchange="salvar(this.value,'${i.id}','2026-05-01')"></td>
<td class="p-3 text-right font-black text-emerald-400">${i.total_cumprimento||0}%</td>
</tr>`
}).join('')
}
  
function renderConcluidos(){
let c=allData.filter(i=>(i.total_cumprimento||0)>=100)

document.getElementById('concluidos-container').innerHTML=
c.map(i=>`<div class="card-micro bg-status-green"><span class="percent-big">100%</span></div>`).join('')

document.getElementById('concluidos-list').innerHTML=
c.map(i=>`<div><b>${i.identificador}</b> ${i.descricao}</div>`).join('')
}

function renderChart(){

let ctx=document.getElementById('barChart').getContext('2d')
if(myChart)myChart.destroy()

let mar=0,abr=0,mai=0,count=allData.length||1

allData.forEach(i=>{
let m=i.evolucao_mensal||[]

mar+=parseFloat(m.find(e=>e.mes_referencia==='2026-03-01')?.percentual_lancado||0)
abr+=parseFloat(m.find(e=>e.mes_referencia==='2026-04-01')?.percentual_lancado||0)
mai+=parseFloat(m.find(e=>e.mes_referencia==='2026-05-01')?.percentual_lancado||0)
})

mar=Math.round(mar/count)
abr=Math.round(abr/count)
mai=Math.round(mai/count)

myChart=new Chart(ctx,{
type:'bar',
data:{
labels:['MAR','ABR','MAI'],
datasets:[{
data:[mar,abr,mai],
backgroundColor:[
mar>=100?'#10b981':mar<=30?'#ef4444':'#f59e0b',
abr>=100?'#10b981':abr<=30?'#ef4444':'#f59e0b',
mai>=100?'#10b981':mai<=30?'#ef4444':'#f59e0b'
]
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{display:false}
},
scales:{
y:{beginAtZero:true,max:100}
}
}
})
}

async function salvar(v,id,m){

if(userP.nivel_acesso!=3){
alert("Somente responsável pode editar")
return
}

await client.from('evolucao_mensal').upsert({
deliberacao_id:id,
mes_referencia:m,
percentual_lancado:v
},{onConflict:'deliberacao_id,mes_referencia'})

await client.from('deliberacoes')
.update({total_cumprimento:v})
.eq('id',id)

carregarDados()
}

function gerarRelatorioPDF(){
const {jsPDF}=window.jspdf
let doc=new jsPDF()

doc.setFontSize(12)
doc.text("RELATÓRIO TAG SEDAM 2026",10,10)

let rows=allData.map(i=>[
i.identificador,
i.descricao?.substring(0,40),
i.responsavel,
(i.total_cumprimento||0)+'%'
])

doc.autoTable({
head:[['Item','Descrição','Responsável','%']],
body:rows,
startY:20,
styles:{fontSize:6}
})

doc.save("relatorio_tag.pdf")
}

function switchTab(t){
localStorage.setItem('activeTab',t)
document.querySelectorAll('.tab-view').forEach(v=>v.classList.add('hidden'))
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('tab-active'))
document.getElementById('view-'+t).classList.remove('hidden')
document.getElementById('tab-'+t).classList.add('tab-active')
}

function renderRanking(){

let map={}

allData.forEach(i=>{
let r=i.responsavel||'---'
if(!map[r]) map[r]=[]
map[r].push(i.total_cumprimento||0)
})

let arr=Object.keys(map).map(k=>{
let avg=Math.round(map[k].reduce((a,b)=>a+b,0)/map[k].length)
return {nome:k,media:avg}
}).sort((a,b)=>b.media-a.media)

document.getElementById('ranking').innerHTML=
arr.map((r,i)=>`
<div class="flex justify-between border-b border-white/5 py-1">
<span>${i+1}º ${r.nome}</span>
<span class="font-bold">${r.media}%</span>
</div>
`).join('')
}

function logout(){
localStorage.clear()
location.reload()
}

function renderSelects(){
let s=document.getElementById('sel-item')
if(!s)return
if(s.options.length==0){
s.innerHTML='<option value="total">TOTAL</option>'
}
}
</script>
  
</body>
</html>
