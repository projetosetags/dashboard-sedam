<!DOCTYPE html>

<style>
body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; }
/* Estilo Semafórico dos Cards - Botão Completo */
.card-micro { padding: 0.15rem; min-height: 40px; display: flex; align-items: center; justify-content: center; transition: 0.2s; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
.bg-status-red { background-color: #991b1b !important; } /* 0-30% */
.bg-status-yellow { background-color: #854d0e !important; } /* 31-99% */
.bg-status-green { background-color: #065f46 !important; } /* 100% */
.percent-big { font-size: 1.1rem; font-weight: 900; color: white; }
.tab-btn { padding: 0.6rem 1rem; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #64748b; border-bottom: 2px solid transparent; transition: 0.3s; }
.tab-active { color: #3b82f6; border-bottom-color: #3b82f6; background: rgba(59,130,246,0.05); }
.input-table { background: transparent; border: none; color: #3b82f6; font-weight: 800; width: 45px; text-align: center; font-size: 11px; }
.row-100 { background: rgba(16, 185, 129, 0.12) !important; color: #10b981; font-weight: 700; }
.legend-box { background: rgba(30,41,59,0.6); border: 1px solid rgba(59,130,246,0.2); padding: 1rem; border-radius: 10px; margin-top: 1rem; font-size: 0.7rem; color: #cbd5e1; white-space: pre-wrap; }
.btn-pdf { background: #ef4444; color: white; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; transition: 0.3s; }
.td-mes { font-size: 12px; font-weight: 700; text-align:center; }
.td-mes-strong { font-size: 16px; font-weight: 900; text-align:center; }
.td-total { font-size: 18px; font-weight: 900; text-align:right; }

.td-desc {
font-size: 11px;
max-width: 280px;
white-space: normal;
line-height: 1.2;
}

.tr-hover:hover { background: rgba(255,255,255,0.04); }

.input-mes {
width: 60px;
font-size: 16px;
font-weight: 900;
text-align:center;
background: #020617;
border:1px solid rgba(255,255,255,0.1);
border-radius:6px;
}
  
</style>
</head>
<body class="p-2 md:p-4">
<div id="login-screen" class="min-h-screen flex items-center justify-center">

<header class="flex justify-between items-center mb-4 px-2">
<div><h2 class="text-lg font-black text-blue-400 leading-none tracking-tighter uppercase">Painel de Auditoria TAG 2026</h2><p id="user-info" class="text-[9px] text-slate-500 mt-1 uppercase italic"></p></div>
<div class="flex items-center gap-4">

<div class="text-right border-l border-white/10 pl-4"><span class="block text-[7px] text-slate-500 font-bold uppercase">Média Geral TAG</span><span id="total-geral" class="text-2xl font-black text-emerald-400">0%</span></div>

<button onclick="switchTab('analise')" id="tab-analise" class="tab-btn">Gráficos</button>
<button onclick="switchTab('concluidos')" id="tab-concluidos" class="tab-btn">100% Cumpridos</button>
</nav>

<div class="flex gap-2 mb-3">
<button onclick="modoResumo='item';renderResumo()" class="text-xs bg-blue-600 px-2 py-1 rounded">ITEM</button>
<button onclick="modoResumo='subitem';renderResumo()" class="text-xs bg-slate-700 px-2 py-1 rounded">SUBITEM</button>
</div>
  
<!-- ABA 1: RESUMO (CARDS SEMAFÓRICOS) -->
<div id="view-resumo" class="tab-view"><div id="cards-container" class="grid grid-cols-6 sm:grid-cols-12 md:grid-cols-16 lg:grid-cols-20 2xl:grid-cols-28 gap-1"></div></div>

<thead>
<tr class="text-[8px] text-slate-500 uppercase border-b border-white/10">

<div id="concluidos-list" class="space-y-2 text-[10px] text-slate-400"></div>
</div>

<script>
let filtroItemAtivo = null
const descItens = {
"1": "Planejamento Estratégico e Governança",
"2": "Análise e Revisão do Planejamento Estratégico",
"3": "Atualização e Consolidação do Plano Estratégico",
"4": "Governança e Monitoramento Estratégico",
"5": "Mapeamento e Melhoria de Processos",
"6": "Desenvolvimento e Estruturação de Sistemas",
"7": "Adequação Normativa e Legal",
"8": "Capacitação Técnica e Sensoriamento",
"9": "Desenvolvimento de Sistemas e Integração",
"10": "Integração e Expansão Tecnológica",
"12": "Transparência e Portal Público",
"15": "Revisão de Plano de Ação",
"24": "Cadastro de Unidades de Conservação",
"25": "Programas Ambientais e REDD+",
"30": "Articulação Institucional",
"31": "Organização e Gestão Operacional",
"33": "Monitoramento e Coleta de Dados",
"45": "Ações Integradas e Cooperação"
}
let modoResumo = 'subitem'
const MESES = [
{n:1,label:'JAN'},
{n:2,label:'FEV'},
{n:3,label:'MAR'},
{n:4,label:'ABR'},
{n:5,label:'MAI'},
{n:6,label:'JUN'},
{n:7,label:'JUL'},
{n:8,label:'AGO'},
{n:9,label:'SET'},
{n:10,label:'OUT'},
{n:11,label:'NOV'},
{n:12,label:'DEZ'}
]

let modoGrupo = 'subitem'
document.addEventListener("DOMContentLoaded",()=>{
let uid=localStorage.getItem("uid")
if(uid){
init(uid)
}else{
const lastTab = localStorage.getItem('activeTab')
if(lastTab) switchTab(lastTab)
}
})

const S_URL='https://zvtzbiqfwhggysiuiuxh.supabase.co'
const S_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2dHpiaXFmd2hnZ3lzaXVpdXhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1ODYyMjcsImV4cCI6MjA5MzE2MjIyN30.tCnFZv2B6Kmd9KsyZM8CHClZqsq7Nyu-8nxyYVs_ZMQ'
const client=supabase.createClient(S_URL,S_KEY)

let userP=null
let allData=[]
let myChart=null

function login(){
let u=document.getElementById('u').value.trim().toLowerCase()

client.from('perfis')
.select('*')
.eq('username',u)
.single()
.then(({data,error})=>{
if(error||!data){alert("Usuário não encontrado");return}
localStorage.setItem("uid",data.id)
init(data.id)
})
}

async function init(uid){
let {data,error}=await client.from('perfis').select('*').eq('id',uid).single()
if(error||!data){alert("Erro perfil");return}
userP=data
let {data:pList}=await client.from('perfis').select('*').order('nome_completo')
window.perfis=pList||[]
document.getElementById('login-screen').classList.add('hidden')
document.getElementById('dashboard').classList.remove('hidden')
const lastTab=localStorage.getItem('activeTab')||'resumo'
switchTab(lastTab)
document.getElementById('user-info').innerText=data.nome_completo+" | "+(data.cargo||'-')+" (Nível "+data.nivel_acesso+")"
if(data.nivel_acesso<=2){
document.getElementById('pdf-container').innerHTML=`<button onclick="gerarRelatorioPDF()" class="btn-pdf">PDF A4</button>`
}
client.channel('rt')
.on('postgres_changes',{event:'*',schema:'public',table:'evolucao_mensal'},()=>carregarDados())
.on('postgres_changes',{event:'*',schema:'public',table:'deliberacoes'},()=>carregarDados())
.subscribe()
carregarDados()
}

async function criarPerfil(nome){
await client.from('perfis').insert({nome_completo:nome})
carregarDados()
}
async function editarPerfil(id,nome){
await client.from('perfis').update({nome_completo:nome}).eq('id',id)
carregarDados()
}
async function excluirPerfil(id){
await client.from('perfis').delete().eq('id',id)
carregarDados()
}
async function carregarDados(){
let query=client.from('deliberacoes').select('*,evolucao_mensal(*),perfis(nome_completo)')
// 🔒 CONTROLE POR RESPONSÁVEL
if(userP.nivel_acesso!=1){
query=query.eq('responsavel_id',userP.id)
}
let {data}=await query
if(!data){allData=[];return}
allData=(data||[])
.filter(d=>d && d.identificador)
.sort((a,b)=>
String(a.identificador||'').localeCompare(String(b.identificador||''),undefined,{numeric:true})
)
let {data:perfisData}=await client.from('perfis').select('id,nome_completo')
window.perfis=perfisData||[]
let media=allData.length
?Math.round(allData.reduce((acc,c)=>acc+(c.total_cumprimento||0),0)/allData.length)
:0

document.getElementById('total-geral').innerText=media+"%"

renderResumo()
renderTable()
renderConcluidos()
renderSelects()
renderChart()
renderRanking()
}

function renderResumo(){

let mapa = {}

allData.forEach(i=>{

let item = i.identificador?.split('.')[0] || '0'

if(!mapa[item]) mapa[item]=[]
mapa[item].push(i)

})

// 🔥 CARDS
document.getElementById('cards-container').innerHTML=
Object.keys(mapa).map(item=>{

let lista = mapa[item]

// média do item
let media = Math.round(
lista.reduce((acc,c)=>acc+(c.total_cumprimento||0),0)/lista.length
)

// cor
let cor =
media<=30 ? 'bg-status-red' :
media>=100 ? 'bg-status-green' :
'bg-status-yellow'

// 🔥 DESCRIÇÃO
let descItem = descItens[item] || `Item ${item}`

return `
<div class="card-micro ${cor}" onclick="abrirItem('${item}')">
<div class="flex flex-col items-center">

<span class="percent-big">${media}%</span>

<span class="text-[7px] text-white/60 mt-1">
ITEM ${item}
</span>

<span class="text-[7px] text-white/40 text-center px-1">
${descItem}
</span>

</div>
</div>
`

}).join('')
}

function abrirItem(item){

filtroItemAtivo = item

// troca para aba monitoramento
switchTab('mensal')

// renderiza tabela filtrada
renderTable()

// mostra botão voltar
document.getElementById('btn-voltar').style.display='block'
}

function renderTable(){
let lista=filtroItemAtivo?allData.filter(i=>i.identificador?.startsWith(filtroItemAtivo+'.')):allData
document.getElementById('table-body').innerHTML=lista.map(i=>{
let dataFormatada='-'
if(i.data_inicio){
let d=new Date(i.data_inicio)
if(!isNaN(d)) dataFormatada=d.toLocaleDateString('pt-BR')
else dataFormatada=i.prazo_texto||i.data_inicio
}else{dataFormatada=i.prazo_texto||'-'}
let podeEditar=(userP.nivel_acesso==1||userP.nivel_acesso==2)||(userP.nivel_acesso==3&&i.responsavel_id==userP.id)
let jan=0
let fev=0
let mar=0
let evol=i.evolucao_mensal||[]
let abr=evol.find(e=>String(e.mes_referencia).startsWith('2026-04'))?.percentual_lancado
let maiReal=evol.find(e=>String(e.mes_referencia).startsWith('2026-05'))?.percentual_lancado
if(!abr||abr==0) abr=i.total_cumprimento||0
let bg=i.status_cor==='red'?'bg-red-900/20':i.status_cor==='yellow'?'bg-yellow-900/20':i.status_cor==='green'?'bg-emerald-900/20':''
let campoResponsavel=(userP.nivel_acesso==1||userP.nivel_acesso==2)?`<select class="bg-slate-800 text-xs p-1 rounded" onchange="salvarResponsavel('${i.id}',this.value)"><option value="">Selecione</option>${(window.perfis||[]).sort((a,b)=>a.nome_completo.localeCompare(b.nome_completo)).map(p=>`<option value="${p.id}" ${p.id==i.responsavel_id?'selected':''}>${p.nome_completo}</option>`).join('')}</select>`:`<span>${i.perfis?.nome_completo||'-'}</span>`
return `<tr class="border-b border-white/5 tr-hover ${bg}">
<td class="p-2 font-black text-blue-400">${i.identificador}</td>
<td class="p-2 td-desc">${i.descricao||'-'}</td>
<td class="text-xs">${campoResponsavel}</td>
<td class="text-xs">${i.coordenadoria||'-'}</td>
<td class="text-xs">${dataFormatada}</td>
<td class="td-mes opacity-40">${jan}%</td>
<td class="td-mes opacity-40">${fev}%</td>
<td class="td-mes opacity-40">${mar}%</td>
<td class="td-mes-strong text-blue-400">${abr}%</td>
<td><input type="number" class="input-mes" value="${maiReal??''}" placeholder="${abr}" ${!podeEditar?'disabled':''} onchange="salvar(this.value,'${i.id}','2026-05-01')"></td>
<td class="td-total text-emerald-400">${Number(i.total_cumprimento||0).toFixed(2)}%</td>
</tr>`
}).join('')
}

async function alterarResponsavel(id,respId){
let p=perfis.find(x=>x.id==respId)
if(!p)return
await client.from('deliberacoes')
.update({
responsavel:p.nome_completo,
responsavel_id:respId
})
.eq('id',id)
carregarDados()
}

function renderConcluidos(){
let lista = allData.filter(i=>(i.total_cumprimento||0)>=100)
// 🔥 AGRUPAMENTO
let mapa = {}

lista.forEach(i=>{

let chave = modoGrupo === 'item'
? i.identificador.split('.')[0]   // 1,2,3
: i.identificador                // 1.1,1.2

if(!mapa[chave]) mapa[chave]=[]
mapa[chave].push(i)
})
// 🔥 CARDS
document.getElementById('concluidos-container').innerHTML=
Object.keys(mapa).map(k=>`
<div class="card-micro bg-status-green">
<span class="percent-big">${mapa[k].length}</span>
<span class="text-[7px] text-white/50 ml-1">${modoGrupo==='item'?'ITEM':'SUB'} ${k}</span>
</div>
`).join('')
// 🔥 LISTA DETALHADA
document.getElementById('concluidos-list').innerHTML=
Object.keys(mapa).map(k=>`

<div class="mb-3">
<div class="text-emerald-400 font-bold mb-1">
${modoGrupo==='item'?'ITEM':'SUBITEM'} ${k} (${mapa[k].length})
</div>

${mapa[k].map(i=>`
<div class="ml-2 text-[10px]">
• <b>${i.identificador}</b> - ${i.descricao}
</div>
`).join('')}

</div>

`).join('')
}

function renderChart(){

let ctx=document.getElementById('barChart').getContext('2d')
if(myChart)myChart.destroy()

let mar=0,abr=0,mai=0,count=allData.length||1

allData.forEach(i=>{
let m=i.evolucao_mensal||[]

mar+=parseFloat(m.find(e=>e.mes_referencia==='2026-03-01')?.percentual_lancado||0)
abr+=parseFloat(m.find(e=>e.mes_referencia==='2026-04-01')?.percentual_lancado||0)
mai+=parseFloat(m.find(e=>e.mes_referencia==='2026-05-01')?.percentual_lancado||0)
})

mar=Math.round(mar/count)
abr=Math.round(abr/count)
mai=Math.round(mai/count)

myChart=new Chart(ctx,{
type:'bar',
data:{
labels:['MAR','ABR','MAI'],
datasets:[{
data:[mar,abr,mai],
backgroundColor:[
mar>=100?'#10b981':mar<=30?'#ef4444':'#f59e0b',
abr>=100?'#10b981':abr<=30?'#ef4444':'#f59e0b',
mai>=100?'#10b981':mai<=30?'#ef4444':'#f59e0b'
]
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{display:false}
},
scales:{
y:{beginAtZero:true,max:100}
}
}
})
}

async function salvar(v,id,mesRef){
v=parseFloat(v)||0
let item=allData.find(x=>x.id==id)
if(!item){alert("Item não encontrado");return}
if((item.total_cumprimento||0)>=100){alert("Item já concluído (100%)");return}
let podeEditar=(userP.nivel_acesso==1||userP.nivel_acesso==2)||(userP.nivel_acesso==3&&item.responsavel_id==userP.id)
if(!podeEditar){alert("Sem permissão");return}
let {error}=await client.from('evolucao_mensal').upsert({deliberacao_id:id,mes_referencia:mesRef,percentual_lancado:v},{onConflict:'deliberacao_id,mes_referencia'})
if(error){console.error(error);alert("Erro ao salvar");return}
let {data:meses}=await client.from('evolucao_mensal').select('percentual_lancado').eq('deliberacao_id',id)
let total=Math.max(...(meses||[]).map(m=>parseFloat(m.percentual_lancado)||0))
await client.from('deliberacoes').update({total_cumprimento:total}).eq('id',id)
await carregarDados()
}

function gerarRelatorioPDF(){
const {jsPDF}=window.jspdf
let doc=new jsPDF()

doc.setFontSize(12)
doc.text("RELATÓRIO TAG SEDAM 2026",10,10)

let rows=allData.map(i=>[
i.identificador,
i.descricao?.substring(0,40),
i.responsavel,
(i.total_cumprimento||0)+'%'
])

doc.autoTable({
head:[['Item','Descrição','Responsável','%']],
body:rows,
startY:20,
styles:{fontSize:6}
})

doc.save("relatorio_tag.pdf")
}

function switchTab(t){
localStorage.setItem('activeTab',t)
document.querySelectorAll('.tab-view').forEach(v=>v.classList.add('hidden'))
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('tab-active'))
document.getElementById('view-'+t).classList.remove('hidden')
document.getElementById('tab-'+t).classList.add('tab-active')
}

function renderRanking(){

// 🔥 ordenar por identificador (1.1, 1.2...)
let lista = [...allData]
.filter(i=>i.identificador)
.sort((a,b)=>
String(a.identificador).localeCompare(String(b.identificador),undefined,{numeric:true})
)

// 🔥 render SUBITENS
document.getElementById('ranking').innerHTML =
lista.map((i,idx)=>{

let v = i.total_cumprimento||0

let cor =
v<=30 ? 'text-red-400' :
v>=100 ? 'text-emerald-400' :
'text-yellow-400'

return `
