<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" href="data:,">
<title>Sedam TAG 2026 - Gestão Estratégica</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { background: radial-gradient(circle at top, #1e293b, #0f172a); color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
.card-glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; }
.card-glass:hover { transform: translateY(-4px); border-color: rgba(59, 130, 246, 0.4); }
/* Layout Compacto para Auditoria */
.status-vencido { border-left: 4px solid #ef4444 !important; background: rgba(239, 68, 68, 0.03); }
.status-alerta { border-left: 4px solid #f59e0b !important; background: rgba(245, 158, 11, 0.03); }
.status-em-dia { border-left: 4px solid #10b981 !important; background: rgba(16, 185, 129, 0.03); }
.card-compact { padding: 1rem !important; min-height: 140px; }
input::placeholder { color: #64748b; }
</style>
</head>
<body class="p-4 md:p-8">
<div id="login-screen" class="min-h-screen flex items-center justify-center">
<div class="card-glass p-10 rounded-3xl w-full max-w-md shadow-2xl">
<h1 class="text-3xl font-black text-center mb-2 text-blue-400">TAG SEDAM 2026</h1>
<p class="text-center text-slate-400 text-sm mb-8">Auditoria de Controle Externo</p>
<div class="space-y-4">
<input type="text" id="userInput" placeholder="Usuário (ex: manoel)" class="w-full p-4 bg-slate-800 rounded-xl border-none text-white focus:ring-2 focus:ring-blue-500">
<input type="password" id="passInput" placeholder="Senha" class="w-full p-4 bg-slate-800 rounded-xl border-none text-white focus:ring-2 focus:ring-blue-500">
<button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold shadow-lg transition-all active:scale-95">Acessar Dashboard</button>
</div>
<p id="login-msg" class="text-center mt-6 text-xs text-red-400 font-medium"></p>
</div>
</div>
<div id="dashboard" class="hidden max-w-7xl mx-auto">
<header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
<div>
<h2 class="text-4xl font-black bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">Monitoramento TAG</h2>
<p id="user-info" class="text-slate-400 font-medium mt-1 italic"></p>
</div>
<button onclick="logout()" class="bg-red-500/10 text-red-400 px-6 py-2 rounded-xl font-bold hover:bg-red-500 transition-all">Sair</button>
</header>
<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
<div class="lg:col-span-2 card-glass p-8 rounded-3xl shadow-xl">
<h3 class="text-xl font-bold mb-6">Evolução Acumulada (%)</h3>
<div class="h-[300px] w-full"><canvas id="mainChart"></canvas></div>
</div>
<div id="form-area" class="card-glass p-8 rounded-3xl shadow-xl hidden">
<h3 class="text-xl font-bold mb-6 text-emerald-400">Atualizar Meta</h3>
<select id="delib_id" class="w-full p-4 mb-4 bg-slate-800 rounded-xl border-none text-sm text-white"></select>
<input type="month" id="mes_ref" class="w-full p-4 mb-4 bg-slate-800 rounded-xl border-none text-white">
<input type="number" id="percentual" placeholder="%" class="w-full p-4 mb-6 bg-slate-800 rounded-xl border-none text-white">
<button onclick="salvarLancamento()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-xl font-bold">Salvar</button>
</div>
</div>
<div id="cards-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 mt-12"></div>
</div>
<script>
const S_URL = 'https://zvtzbiqfwhggysiuiuxh.supabase.co';
const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2dHpiaXFmd2hnZ3lzaXVpdXhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1ODYyMjcsImV4cCI6MjA5MzE2MjIyN30.tCnFZv2B6Kmd9KsyZM8CHClZqsq7Nyu-8nxyYVs_ZMQ';
const client = supabase.createClient(S_URL, S_KEY, { global: { headers: { 'apikey': S_KEY } } });
let userProfile = null;
async function login() {
let email = document.getElementById('userInput').value.trim().toLowerCase();
const password = document.getElementById('passInput').value;
if(!email.includes('@')) email += '@sedam.com';
const { data, error } = await client.auth.signInWithPassword({ email, password });
if(error) document.getElementById('login-msg').innerText = "Falha: " + error.message;
else init(data.user.id);
}
async function init(uid) {
const { data: profile } = await client.from('perfis').select('*').eq('id', uid).single();
if(!profile) return;
userProfile = profile;
document.getElementById('login-screen').classList.add('hidden');
document.getElementById('dashboard').classList.remove('hidden');
document.getElementById('user-info').innerText = `${profile.nome_completo} | ${profile.nivel_acesso}`;
if(profile.hierarquia >= 3) document.getElementById('form-area').classList.remove('hidden');
carregarDados();
}
async function carregarDados() {
const { data: delibs } = await client.from('deliberacoes').select('*, perfis:responsavel_id(nome_completo)').order('identificador');
renderCards(delibs);
const { data: evolucao } = await client.from('evolucao_mensal').select('*').order('mes_referencia');
renderChart(evolucao);
}
function renderCards(itens) {
    const container = document.getElementById('cards-container');
    const hoje = new Date();
    if (!itens || itens.length === 0) {
        container.innerHTML = "<p class='col-span-full text-center py-20 text-slate-500'>Aguardando carga...</p>";
        return;
    }
    container.innerHTML = itens.map(i => {
        const prazo = new Date(i.prazo);
        const diff = Math.ceil((prazo - hoje) / 86400000);
        let cor = 'status-em-dia';
        if (diff < 0) cor = 'status-vencido'; else if (diff <= 30) cor = 'status-alerta';
        return `
        <div class="card-glass card-compact rounded-xl ${cor} flex flex-col justify-between shadow-sm">
            <div>
                <div class="flex justify-between items-start mb-1">
                    <span class="font-black text-blue-400 text-sm">${i.identificador}</span>
                    <span class="text-[9px] font-bold ${diff < 0 ? 'text-red-400' : 'text-slate-500'}">${prazo.toLocaleDateString('pt-BR')}</span>
                </div>
                <p class="text-[10px] text-slate-300 leading-tight line-clamp-3 mb-2" title="${i.descricao}">${i.descricao}</p>
            </div>
            <div class="border-t border-white/5 pt-2">
                <div class="flex justify-between text-[9px] mb-1">
                    <span class="text-slate-500 truncate mr-1">Resp: ${i.perfis?.nome_completo?.split(' ')[0] || 'Audit.'}</span>
                    <span class="font-bold text-blue-400">${i.total_cumprimento || 0}%</span>
                </div>
                <div class="w-full bg-slate-900 h-1 rounded-full overflow-hidden">
                    <div class="bg-blue-500 h-full transition-all duration-1000" style="width:${i.total_cumprimento || 0}%"></div>
                </div>
            </div>
        </div>`;
    }).join('');
}
function renderChart(dados) {
const ctx = document.getElementById('mainChart').getContext('2d');
new Chart(ctx, { type: 'line', data: { labels: dados?.map(d => d.mes_referencia) || [], datasets: [{ label: 'Evolução %', data: dados?.map(d => d.percentual_lancado) || [], borderColor: '#3b82f6', tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false } });
}
async function logout() { await client.auth.signOut(); location.reload(); }
document.addEventListener('DOMContentLoaded', async () => {
const { data } = await client.auth.getSession();
if(data.session) init(data.session.user.id);
});
</script>
</body>
</html>
