<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MONITORAMENTO TÉCNICO</title>
<link rel="icon" href="../assets/logo.png">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link rel="stylesheet" href="monitoramento.css">
</head>
<body>

<div id="appMonitoramento">

<header class="topbar">

<div class="topbar-left">
<div class="logo-box">📊</div>
<div>
<h1 class="titulo-sistema">MONITORAMENTO TÉCNICO</h1>
<div class="subtitulo-sistema">
Tribunal de Contas • Painel de Auditoria
</div>
</div>
</div>

<div class="topbar-right">
<div id="usuarioLogado" class="usuario-logado">
AUDITOR
</div>
</div>

</header>

<nav class="nav-monitoramento">

<button class="nav-btn nav-active" onclick="abrirTela('dashboard')">
📈 Dashboard
</button>

<button class="nav-btn" onclick="abrirTela('monitoramentos')">
📂 Monitoramentos
</button>

<button class="nav-btn" onclick="abrirTela('matriz')">
🧩 Matriz
</button>

<button class="nav-btn" onclick="abrirTela('evidencias')">
📎 Evidências
</button>

<button class="nav-btn" onclick="abrirTela('analises')">
🧠 Análises
</button>

<button class="nav-btn" onclick="abrirTela('relatorios')">
📄 Relatórios
</button>

<button class="nav-btn" onclick="abrirTela('resultados')">
📑 Resultados
</button>

<button class="nav-btn" onclick="abrirTela('auditoria')">
🕓 Auditoria
</button>

</nav>

<main class="conteudo-monitoramento">

<section id="tela-dashboard" class="tela-monitoramento">
<div id="painelAlertas"></div>
<div class="grid-cards">

<div class="card-kpi">
<div class="kpi-titulo">TOTAL</div>
<div id="kpiTotal" class="kpi-valor">0</div>
</div>

<div class="card-kpi verde">
<div class="kpi-titulo">EXECUTADAS</div>
<div id="kpiExecutadas" class="kpi-valor">0</div>
</div>

<div class="card-kpi amarelo">
<div class="kpi-titulo">PARCIAIS</div>
<div id="kpiParciais" class="kpi-valor">0</div>
</div>

<div class="card-kpi vermelho">
<div class="kpi-titulo">NÃO EXECUTADAS</div>
<div id="kpiNaoExecutadas" class="kpi-valor">0</div>
</div>

<div class="card-kpi azul">
<div class="kpi-titulo">EM ANDAMENTO</div>
<div id="kpiAndamento" class="kpi-valor">0</div>
</div>

</div>

<div class="painel-graficos">

<div class="grafico-box">
<div class="grafico-header">
<div class="grafico-titulo">Situação Geral</div>
</div>
<canvas id="graficoStatus"></canvas>
</div>

<div class="grafico-box">
<div class="grafico-header">
<div class="grafico-titulo">Evolução Mensal</div>
</div>
<canvas id="graficoEvolucao"></canvas>
</div>

<div class="grafico-box">
<div class="grafico-header">
<div class="grafico-titulo">Criticidade</div>
</div>
<canvas id="graficoCriticidade"></canvas>
</div>

<div class="grafico-box">
<div class="grafico-header">
<div class="grafico-titulo">Benefícios Esperados</div>
</div>
<canvas id="graficoBeneficios"></canvas>
</div>

</div>

</section>

<section id="tela-monitoramentos" class="tela-monitoramento hidden">

<div class="top-actions">

<button class="btn-padrao" onclick="novoMonitoramento()">
➕ Novo Monitoramento
</button>

<div class="filtros-monitoramento">

<input type="text" id="buscaMonitoramento" placeholder="Pesquisar..." class="input-busca" onkeyup="filtrarMonitoramentos()">

<select id="filtroStatus" class="select-monitoramento" onchange="filtrarMonitoramentos()">
<option value="">Todos Status</option>
<option>EXECUTADA</option>
<option>PARCIALMENTE EXECUTADA</option>
<option>NÃO EXECUTADA</option>
<option>EM ANDAMENTO</option>
</select>

<select id="filtroCriticidade" class="select-monitoramento" onchange="filtrarMonitoramentos()">
<option value="">Criticidade</option>
<option>ALTA</option>
<option>MÉDIA</option>
<option>BAIXA</option>
</select>

</div>

</div>

<div id="listaMonitoramentos" class="lista-monitoramentos"></div>

</section>

<section id="tela-matriz" class="tela-monitoramento hidden">

<div class="top-actions">

<button class="btn-padrao" onclick="salvarNovoItemMatriz()">
💾 Salvar Item
</button>

<button class="btn-padrao azul" onclick="limparFormularioMatriz()">
🧹 Limpar
</button>

</div>

<div class="form-matriz">

<div class="form-grid">

<div class="campo-form">
<label>Item</label>
<input type="text" id="mItem" class="input-form">
</div>

<div class="campo-form">
<label>Subitem</label>
<input type="text" id="mSubitem" class="input-form">
</div>

<div class="campo-form">
<label>Status</label>
<select id="mStatus" class="input-form">
<option>EM ANDAMENTO</option>
<option>EXECUTADA</option>
<option>PARCIALMENTE EXECUTADA</option>
<option>NÃO EXECUTADA</option>
</select>
</div>

<div class="campo-form">
<label>Criticidade</label>
<select id="mCriticidade" class="input-form">
<option>ALTA</option>
<option>MÉDIA</option>
<option>BAIXA</option>
</select>
</div>

<div class="campo-form">
<label>Prazo</label>
<input type="date" id="mPrazo" class="input-form">
</div>

<div class="campo-form">
<label>Percentual</label>
<input type="number" id="mPercentual" class="input-form" min="0" max="100">
</div>

</div>

<div class="campo-form">
<label>Achado</label>
<textarea id="mAchado" class="textarea-form"></textarea>
</div>

<div class="campo-form">
<label>Causa</label>
<textarea id="mCausa" class="textarea-form"></textarea>
</div>

<div class="campo-form">
<label>Efeito</label>
<textarea id="mEfeito" class="textarea-form"></textarea>
</div>

<div class="campo-form">
<label>Deliberação</label>
<textarea id="mDeliberacao" class="textarea-form"></textarea>
</div>

<div class="campo-form">
<label>Ação do Gestor</label>
<textarea id="mAcaoGestor" class="textarea-form"></textarea>
</div>

<div class="campo-form">
<label>Produto Esperado</label>
<textarea id="mProduto" class="textarea-form"></textarea>
</div>

<div class="campo-form">
<label>Entrega Esperada</label>
<textarea id="mEntrega" class="textarea-form"></textarea>
</div>

<div class="campo-form">
<label>Benefício Esperado</label>
<textarea id="mBeneficio" class="textarea-form"></textarea>
</div>

</div>

<div class="table-wrap">

<table class="tabela-monitoramento">

<thead>
<tr>
<th>Item</th>
<th>Subitem</th>
<th>Status</th>
<th>%</th>
<th>Criticidade</th>
<th>Prazo</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tbodyMatriz"></tbody>

</table>

</div>

</section>

<section id="tela-evidencias" class="tela-monitoramento hidden">

<div class="upload-box">

<input type="file" id="arquivoEvidencia">

<button class="btn-padrao" onclick="uploadEvidencia()">
📤 Enviar Evidência
</button>

</div>

<div id="listaEvidencias"></div>

</section>

<section id="tela-analises" class="tela-monitoramento hidden">

<div class="analise-box">

<div class="toolbar-analise">

<button class="btn-editor" onclick="formatarTexto('bold')">
<b>B</b>
</button>

<button class="btn-editor" onclick="formatarTexto('italic')">
<i>I</i>
</button>

<button class="btn-editor" onclick="formatarTexto('underline')">
<u>U</u>
</button>

<button class="btn-editor" onclick="inserirTopico()">
• Tópico
</button>

<button class="btn-editor" onclick="inserirConclusaoPadrao()">
📌 Conclusão
</button>

</div>

<div id="textoAnalise" class="editor-analise" contenteditable="true"></div>

<button class="btn-padrao" onclick="salvarAnalise()">
💾 Salvar Análise
</button>

<button class="btn-padrao azul" onclick="gerarAnaliseIA()">
🧠 Gerar IA
</button>

</div>

<div id="listaAnalises"></div>

</section>

<section id="tela-relatorios" class="tela-monitoramento hidden">

<div class="relatorio-actions">

<button class="btn-padrao verde" onclick="gerarPDFMonitoramento()">
📄 Gerar PDF
</button>

<button class="btn-padrao azul" onclick="abrirModoImpressao()">
🖨 Modo Impressão
</button>
  
<button class="btn-padrao azul" onclick="gerarResumoIA()">
🧠 Gerar Resumo IA
</button>

</div>

<div class="relatorio-actions">

<button class="btn-padrao verde" onclick="gerarRelatorioCompleto()">
📑 Relatório Completo
</button>

<button class="btn-padrao azul" onclick="gerarResumoIA()">
🧠 Resumo Executivo
</button>

<button class="btn-padrao" onclick="gerarPDFMonitoramento()">
📄 Exportar PDF
</button>

</div>

<div id="previewRelatorio" class="preview-relatorio"></div>

</section>

<section id="tela-resultados" class="tela-monitoramento hidden">

<div class="top-actions">

<button class="btn-padrao" onclick="salvarResultadoMonitoramento()">
💾 Salvar Resultado
</button>

<button class="btn-padrao azul" onclick="limparResultadoMonitoramento()">
🧹 Limpar
</button>

</div>

<div class="form-matriz">

<div class="campo-form">
<label>Situação Encontrada</label>
<textarea id="rSituacao" class="textarea-form"></textarea>
</div>

<div class="campo-form">
<label>Efeitos</label>
<textarea id="rEfeitos" class="textarea-form"></textarea>
</div>

<div class="campo-form">
<label>Causas</label>
<textarea id="rCausas" class="textarea-form"></textarea>
</div>

<div class="campo-form">
<label>Boas Práticas</label>
<textarea id="rBoasPraticas" class="textarea-form"></textarea>
</div>

<div class="campo-form">
<label>Encaminhamento</label>
<textarea id="rEncaminhamento" class="textarea-form"></textarea>
</div>

<div class="campo-form">
<label>Benefícios</label>
<textarea id="rBeneficios" class="textarea-form"></textarea>
</div>

</div>

<div id="listaResultados"></div>

</section>

<section id="tela-auditoria" class="tela-monitoramento hidden">

<div class="top-actions">

<button class="btn-padrao azul" onclick="carregarAuditoriaCompleta()">
🔄 Atualizar Auditoria
</button>

</div>

<div id="listaAuditoria"></div>

</section>

</main>

</div>

<script src="monitoramento-core.js"></script>
<script src="monitoramento-painel.js"></script>
<script src="monitoramento-matriz.js"></script>
<script src="monitoramento-evidencias.js"></script>
<script src="monitoramento-relatorio.js"></script>
<script src="monitoramento-analise-ia.js"></script>
<script src="monitoramento-pdf.js"></script>
<script src="monitoramento-resultados.js"></script>

<div id="modalImpressao" class="modal-impressao hidden">

<div class="modal-impressao-content">

<div class="modal-impressao-topo">

<div class="modal-impressao-titulo">
📄 Impressão Oficial
</div>

<div style="display:flex;gap:10px;flex-wrap:wrap;">

<button class="btn-padrao verde" onclick="window.print()">
🖨 Imprimir
</button>

<button class="btn-padrao vermelho" onclick="fecharModalImpressao()">
Fechar
</button>

</div>

</div>

<div id="conteudoImpressao"></div>

</div>

</div>
  
</body>
</html>
